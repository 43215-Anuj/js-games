<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Block Vs Ball</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── Futuristic Base ─────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #07090f;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,58,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,255,0.06) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Radial neon glow behind canvas */
        body::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px; height: 700px;
            background: radial-gradient(ellipse, rgba(124,58,255,0.18) 0%, rgba(34,211,238,0.07) 50%, transparent 75%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.6; transform: translate(-50%,-50%) scale(0.95); }
            to   { opacity: 1;   transform: translate(-50%,-50%) scale(1.05); }
        }

        /* Background image layer with futuristic tint */
        .bg-layer {
            position: fixed;
            inset: 0;
            background-image: url(assets/atlas/load/BG_14.jpg);
            background-size: cover;
            background-position: center;
            opacity: 0.07;
            z-index: 0;
        }

        /* Canvas */
        canvas {
            position: absolute;
            top: 0; bottom: 0; right: 0; left: 0;
            margin: auto;
            z-index: 2;
            /* Neon border glow */
            box-shadow:
                0 0 0 1px rgba(124,58,255,0.3),
                0 0 30px rgba(124,58,255,0.25),
                0 0 60px rgba(34,211,238,0.12);
        }

        /* Corner decorations */
        .corner {
            position: fixed;
            width: 40px; height: 40px;
            z-index: 1;
            pointer-events: none;
        }
        .corner-tl { top: 16px; left: 16px; border-top: 2px solid rgba(124,58,255,0.7); border-left: 2px solid rgba(124,58,255,0.7); }
        .corner-tr { top: 16px; right: 16px; border-top: 2px solid rgba(34,211,238,0.7); border-right: 2px solid rgba(34,211,238,0.7); }
        .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid rgba(34,211,238,0.7); border-left: 2px solid rgba(34,211,238,0.7); }
        .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid rgba(124,58,255,0.7); border-right: 2px solid rgba(124,58,255,0.7); }

        /* Title watermark */
        .game-watermark {
            position: fixed;
            top: 18px; left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(124,58,255,0.55);
            pointer-events: none;
            white-space: nowrap;
        }

        /* iPhone close button (game's own) */
        #dvIPhoneClose {
            position: fixed;
            z-index: 9999;
        }
        #dvIPhoneClose img {
            filter: invert(1) sepia(1) saturate(5) hue-rotate(230deg);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- bg tint layer -->
    <div class="bg-layer"></div>
    <!-- corner accent decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <!-- subtle title watermark -->
    <div class="game-watermark">⬡ Block vs Ball ⬡</div>

    <!--<div id = "turn"></div>-->
    <script src="assets/game.js"></script>
    <script src="assets/spaceballs.js"></script>

    <link href="assets/toastr/toastr.css" rel="stylesheet"/>
    <script src="assets/toastr/toastr.min.js"></script>

    <link rel="stylesheet" type="text/css" href="css/charge_game.css">
    <script defer src="assets/fontawesome-all.js"></script>
    <script type="text/javascript" src="assets/game.core.js"></script>

    <div id = 'dvIPhoneClose' onclick="ClickIPhoneCloseButton()"  style="display:none">
        <img src="assets/close_small.png" style="width:50px">
    </div>
    <script type="text/javascript">
        if(navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
            document.getElementById('dvIPhoneClose').setAttribute("style", "display:block");
        }
        SetPositonIPhoneCloseButton( '0%', '7%', '0%', '0%');//
    </script>
  
</body>
</html>
